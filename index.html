<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
    margin:0;
    background:#000;
}

video{
    width:100vw;
    height:100vh;
}
</style>

</head>

<body>


<video id="video"
controls
controlsList="nodownload"
playsinline
oncontextmenu="return false">
</video>


<script>

const video = document.getElementById("video");

let url = new URLSearchParams(location.search).get("url");


if(!url){

document.body.innerHTML =
"<h2 style='color:white;text-align:center'>ไม่พบลิงก์</h2>";

}


// Pixeldrain
if(url.includes("https://series1000z.com/e/")){

    url = url.replace(
    "https://series1000z.com/e/",
    "https://series1000z.com/e/"
    );

}


if(url.includes(".m3u8")){


    if(Hls.isSupported()){

        const hls = new Hls();

        hls.loadSource(url);

        hls.attachMedia(video);

    }else{

        video.src=url;

    }


}else{


    video.src=url;


}


</script>


</body>
</html>
