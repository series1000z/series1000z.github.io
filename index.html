<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Player</title>

<style>

body{
    margin:0;
    background:#000;
}

iframe{
    width:100vw;
    height:100vh;
    border:0;
}

</style>

</head>

<body>


<iframe 
id="player"
allowfullscreen
allow="autoplay; fullscreen">
</iframe>


<script>

let url = new URLSearchParams(location.search).get("url");


if(url){

document.getElementById("player").src = url;

}else{

document.body.innerHTML =
"<h2 style='color:white;text-align:center'>ไม่พบลิงก์</h2>";

}

</script>


</body>
</html>
