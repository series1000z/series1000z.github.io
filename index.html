<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>My Video Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>


<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}


.box{
    padding:20px;
}


input{
    width:80%;
    padding:12px;
    font-size:16px;
}


button{
    padding:12px 25px;
    margin:10px;
    cursor:pointer;
}


video{
    width:90%;
    max-height:80vh;
    background:#000;
}


</style>

</head>


<body>


<div class="box">

<h2>Video Player</h2>


<input id="url"
placeholder="ใส่ลิงก์ mp4 หรือ m3u8">


<button onclick="playVideo()">
เล่น
</button>


</div>


<video
id="video"
controls
controlsList="nodownload"
oncontextmenu="return false"
playsinline>
</video>



<script>


let hls;


function playVideo(){


const url =
document.getElementById("url").value;


const video =
document.getElementById("video");



// ล้างตัวเก่า

if(hls){
    hls.destroy();
}



// m3u8

if(url.includes(".m3u8")){


    if(Hls.isSupported()){


        hls = new Hls();

        hls.loadSource(url);

        hls.attachMedia(video);


    }else{

        video.src=url;

    }


}


// mp4 / pixeldrain

else{


    video.src=url;

}


video.play();


}



</script>


</body>
</html>
